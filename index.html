<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teesha Portfolio</title>
  <link rel="stylesheet" href="styles/main.css" />
</head>

<body>
  <div class="scene" id="scene">
    <div class="scene__layer sky-layer" id="skyLayer"></div>
    <div class="scene__layer rainbow-layer" id="rainbowLayer" aria-hidden="true"></div>
    <div class="scene__layer island-layer" id="islandLayer" aria-hidden="true"></div>
    <div class="scene__layer forest-layer forest-layer--back" id="forestBackLayer" aria-hidden="true">
      <img class="forest-layer__image forest-layer__image--back" src="assets/decor/forestBack.webp" alt="" />
    </div>
    <div class="scene__layer forest-layer forest-layer--front" id="forestFrontLayer" aria-hidden="true">
      <img class="forest-layer__image forest-layer__image--front" src="assets/decor/forestFront.webp" alt="" />
    </div>
    <div class="scene__layer sun-layer" id="sunLayer" aria-hidden="true"></div>
    <div class="scene__layer cloud-layer" id="cloudLayer" aria-hidden="true"></div>
    <div class="scene__layer star-layer" id="starLayer" aria-hidden="true"></div>
    <div class="scene__layer firefly-layer" id="fireflyLayer" aria-hidden="true"></div>
    <div class="scene__layer shooting-star-layer" id="shootingStarLayer" aria-hidden="true"></div>
    <div class="scene__layer bird-layer" id="birdLayer" aria-hidden="true"></div>
    <div class="scene__layer sky-beast-layer" id="skyBeastLayer" aria-hidden="true"></div>
    <div class="scene__layer weather-tone-layer" id="weatherToneLayer" aria-hidden="true"></div>
    <div class="scene__layer rain-layer" id="rainLayer" aria-hidden="true"></div>
    <div class="scene__layer screen-droplet-layer" id="screenDropletLayer" aria-hidden="true"></div>
    <div class="scene__layer lightning-layer" id="lightningLayer" aria-hidden="true"></div>
    <div class="scene__layer bunny-layer" id="bunnyLayer" aria-hidden="true"></div>
    <div class="scene__layer ground-layer" id="groundLayer" aria-hidden="true">
      <img class="ground-layer__image" src="assets/decor/grass.webp" alt="" />
    </div>
  </div>

  <main class="site-overlay" id="timeControls">

    <div class="menu-screen">

      <!-- Title -->
      <img src="assets/decor/title.webp" alt="Game Title" class="menu-title">

      <!-- Buttons -->
      <div class="menu-buttons">

        <button class="fantasy-btn" data-action="open-portfolio" type="button">
          <span class="fantasy-btn__text">PORTFOLIO</span>
        </button>

        <button class="fantasy-btn" data-action="open-snapshot" type="button">
          <span class="fantasy-btn__text">SNAPSHOT</span>
        </button>

        <button class="fantasy-btn" data-action="open-change" type="button">
          <span class="fantasy-btn__text">CHANGE</span>
        </button>
      </div>

    </div>

    <section class="portfolio-screen" id="portfolioScreen" aria-hidden="true">

      <div class="portfolio-screen__frame">

        <img class="portfolio-screen__image portfolio-screen__image--desktop" src="assets/decor/mainScreen.png" />

        <!-- 🔥 TITLE (anchored to wood plate) -->
        <div class="board-title" id="boardTitle">
          PORTFOLIO
        </div>

        <!-- 🔥 THIS IS YOUR SCREEN -->
        <div id="board-content">



        </div>

      </div>

    </section>
  </main>

  <script type="module" src="scripts/main.js"></script>
</body>

</html>
